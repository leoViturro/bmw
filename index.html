<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N54 King Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050608;
            --panel-bg: rgba(16, 18, 22, 0.95);
            --panel-border: rgba(255, 255, 255, 0.08);
            --m-blue-light: #00f2ff;
            --m-blue-dark: #1c39bb;
            --m-red: #ed1c24;
            --accent-red-glow: rgba(237, 28, 36, 0.6);
            --text-main: #ffffff;
            --text-muted: #8a8d93;
            --display-bg: #000000;
            --warning-orange: #ffaa00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.01) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.01) 50%, rgba(255,255,255,0.01) 75%, transparent 75%, transparent),
                radial-gradient(circle at 50% 0%, #1a202c 0%, transparent 80%);
            background-size: 4px 4px, 100% 100%;
            overflow: hidden;
        }

        .main-container {
            width: 94%;
            max-width: 400px;
            height: 98vh;
            max-height: 850px;
            padding: 12px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden; 
        }

        .m-accent-border {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            display: flex;
            z-index: 10;
        }
        .b-1 { background: #00a2e8; flex: 1; }
        .b-2 { background: var(--m-blue-dark); flex: 1; }
        .b-3 { background: var(--m-red); flex: 1; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            font-style: italic;
            letter-spacing: -1px;
        }
        .logo span { color: var(--m-red); }

        .display-group {
            display: flex;
            gap: 10px;
            margin-top: 8%; 
        }

        .display-box {
            flex: 1;
            background: var(--display-bg);
            border-bottom: 3px solid #00a2e8;
            border-radius: 15px;
            padding: 10px;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
        }
        .display-box:active { transform: scale(0.98); }
        .display-box.duty { border-bottom-color: var(--m-red); }

        .display-label {
            font-size: 0.55rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2px;
        }

        .display-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
        }
        .display-unit { font-size: 0.9rem; color: var(--text-muted); margin-left: 4px; }

        .controls-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: center;
        }

        .control-group {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 8px 14px 4px 14px;
            border: 1px solid var(--panel-border);
            position: relative;
            min-height: 88px;
        }

        .control-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 3px;
            display: block;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-plus-minus {
            width: 42px;
            height: 42px;
            background: linear-gradient(145deg, #1a1d24, #0d0f12);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .btn-plus-minus:active { background: #1c1f26; }

        .control-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            min-width: 80px;
            text-align: center;
        }

        .action-area {
            margin-top: 2px;
            min-height: 65px;
            display: flex;
            align-items: center;
        }

        #prepareBtn {
            background: linear-gradient(135deg, #cc0000 0%, #800000 100%);
            color: white;
            border: 1px solid #000;
            outline: 1px solid rgba(255,255,255,0.1);
            padding: 14px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            width: 100%;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            cursor: pointer;
        }

        .slider-container {
            display: none;
            background: #000;
            border-radius: 40px;
            height: 62px;
            width: 100%;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; 
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.8);
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .slider-container.success-state {
            border-color: var(--m-blue-light);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4), inset 0 0 10px rgba(0, 242, 255, 0.2);
        }

        .slider-track-text {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: var(--text-muted); 
            font-size: 0.75rem; 
            font-weight: 700;
            letter-spacing: 1.5px;
            z-index: 1;
        }

        .slider-thumb {
            width: 52px; height: 52px;
            background: var(--m-red);
            border-radius: 50%;
            position: absolute; left: 5px; top: 3px;
            display: flex; justify-content: center; align-items: center;
            z-index: 6;
            box-shadow: 0 0 15px var(--accent-red-glow);
            transition: transform 0.1s ease;
        }

        .slider-progress {
            position: absolute; top: 0; left: 0; height: 100%;
            background: rgba(237, 28, 36, 0.2);
            z-index: 2;
        }

        .warning-msg {
            font-size: 0.6rem;
            color: var(--warning-orange);
            font-weight: 800;
            text-align: center;
            margin-top: 1px;
            visibility: hidden;
            text-transform: uppercase;
        }

        .critical { border-color: var(--warning-orange); background: rgba(255, 170, 0, 0.05); }
        .critical .warning-msg { visibility: visible; animation: pulse-warn 1s infinite; }

        @keyframes pulse-warn {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>

<div class="main-container" id="app">
    <div class="m-accent-border">
        <div class="b-1"></div><div class="b-2"></div><div class="b-3"></div>
    </div>

    <div class="header">
        <div class="logo">N54 <span>KING</span></div>
        <div class="signal-indicator" style="background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:12px; font-size:0.65rem; font-weight:700; display:flex; align-items:center; gap:6px;">
            <div id="statusDot" style="width:8px; height:8px; border-radius:50%; background:#00f260; box-shadow:0 0 10px #00f260;"></div>
            <span id="statusText">CONECTADO</span>
        </div>
    </div>

    <div class="display-group">
        <div class="display-box" onclick="resetPeak('boost')">
            <div class="display-label">PRESIÓN</div>
            <div class="display-value"><span id="readPresion">0.0</span><span class="display-unit">PSI</span></div>
            <div style="font-size:0.6rem; text-align:center; color:var(--text-muted);"><span style="color:var(--m-blue-light)">MÁX</span> <span id="peakBoost">0.0</span></div>
        </div>
        <div class="display-box duty" onclick="resetPeak('duty')">
            <div class="display-label">DUTY</div>
            <div class="display-value"><span id="readDuty">0</span><span class="display-unit">%</span></div>
            <div style="font-size:0.6rem; text-align:center; color:var(--text-muted);"><span style="color:var(--m-red)">MÁX</span> <span id="peakDuty">0</span></div>
        </div>
    </div>

    <div class="controls-wrapper" id="controlsContainer">
        <div class="control-group">
            <span class="control-label">Presión Inicial (PSI)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pi', -1)" ontouchstart="handlePress(event, 'pi', -1)">-</button>
                <span class="control-value" id="valPI">10</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pi', 1)" ontouchstart="handlePress(event, 'pi', 1)">+</button>
            </div>
            <div class="warning-msg">AJUSTANDO</div>
        </div>

        <div class="control-group">
            <span class="control-label">Presión Final (PSI)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pf', -1)" ontouchstart="handlePress(event, 'pf', -1)">-</button>
                <span class="control-value" id="valPF">20</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pf', 1)" ontouchstart="handlePress(event, 'pf', 1)">+</button>
            </div>
            <div class="warning-msg">AJUSTANDO</div>
        </div>

        <div class="control-group" id="dutyGroupI">
            <span class="control-label">Duty Inicial (%)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'di', -1)" ontouchstart="handlePress(event, 'di', -1)">-</button>
                <span class="control-value" id="valDI">30</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'di', 1)" ontouchstart="handlePress(event, 'di', 1)">+</button>
            </div>
            <div class="warning-msg">PELIGRO: DUTY ALTO</div>
        </div>

        <div class="control-group" id="dutyGroupF">
            <span class="control-label">Duty Final (%)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'df', -1)" ontouchstart="handlePress(event, 'df', -1)">-</button>
                <span class="control-value" id="valDF">60</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'df', 1)" ontouchstart="handlePress(event, 'df', 1)">+</button>
            </div>
            <div class="warning-msg">PELIGRO: DUTY ALTO</div>
        </div>
    </div>

    <div class="action-area">
        <button id="prepareBtn" onclick="showSlider()">PROGRAMAR</button>
        <div class="slider-container" id="sliderContainer">
            <div class="slider-progress" id="sliderProgress"></div>
            <div class="slider-track-text" id="sliderText">DESLIZA PARA GRABAR</div>
            <div class="slider-thumb" id="sliderThumb">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </div>
        </div>
    </div>
</div>

<script>
    let values = { pi: 10, pf: 20, di: 30, df: 60 };
    let peaks = { boost: 0.0, duty: 0 };
    let isLocked = false;
    let adjustInterval;

    function haptic(ms = 15) { if (navigator.vibrate) navigator.vibrate(ms); }

    function resetPeak(type) {
        haptic(30);
        peaks[type] = 0;
        document.getElementById(type === 'boost' ? 'peakBoost' : 'peakDuty').innerText = type === 'boost' ? '0.0' : '0';
    }

    function handlePress(e, id, delta) {
        if (isLocked) return;
        e.preventDefault();
        haptic(15);
        updateValue(id, delta);
        adjustInterval = setInterval(() => { haptic(10); updateValue(id, delta); }, 80);
    }

    function stopAdjust() { clearInterval(adjustInterval); }
    window.addEventListener('touchend', stopAdjust);
    window.addEventListener('mouseup', stopAdjust);

    function updateValue(id, delta) {
        let nv = values[id] + delta;
        if (id === 'pi' && nv > values.pf) nv = values.pf;
        if (id === 'pf' && nv < values.pi) nv = values.pi;
        nv = Math.max(0, Math.min(100, nv));
        values[id] = nv;
        document.getElementById(`val${id.toUpperCase()}`).innerText = nv;
        document.getElementById('dutyGroupI').classList.toggle('critical', values.di > 85);
        document.getElementById('dutyGroupF').classList.toggle('critical', values.df > 85);
    }

    function showSlider() {
        haptic(40);
        isLocked = true;
        document.getElementById('controlsContainer').style.opacity = '0.2';
        document.getElementById('prepareBtn').style.display = 'none';
        const container = document.getElementById('sliderContainer');
        container.style.display = 'block';
        container.classList.remove('success-state');
    }

    const thumb = document.getElementById('sliderThumb');
    const container = document.getElementById('sliderContainer');
    const progress = document.getElementById('sliderProgress');
    const sliderText = document.getElementById('sliderText');
    let isDragging = false;

    const onStart = (e) => { if (!isLocked) return; isDragging = true; haptic(10); thumb.style.transition = 'none'; };
    
    const onEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        let pos = parseInt(thumb.style.left) || 5;
        let maxPos = container.offsetWidth - 58;
        if (pos > maxPos - 15) {
            confirmProgram();
        } else {
            thumb.style.transition = 'all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1)';
            thumb.style.left = '5px';
            progress.style.width = '0';
            sliderText.style.opacity = '1';
            thumb.style.background = 'var(--m-red)';
            thumb.style.boxShadow = '0 0 15px var(--accent-red-glow)';
        }
    };

    const onMove = (e) => {
        if (!isDragging) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let rect = container.getBoundingClientRect();
        let maxPos = container.offsetWidth - 58;
        let x = Math.max(5, Math.min(clientX - rect.left - 26, maxPos));
        thumb.style.left = x + 'px';
        progress.style.width = x + 26 + 'px';
        
        let factor = (x - 5) / (maxPos - 5);
        let r = Math.round(237 + factor * (0 - 237));
        let g = Math.round(28 + factor * (242 - 28));
        let b = Math.round(36 + factor * (255 - 36));
        thumb.style.background = `rgb(${r}, ${g}, ${b})`;
        thumb.style.boxShadow = `0 0 ${15 + factor * 10}px rgba(${r}, ${g}, ${b}, 0.6)`;
        
        sliderText.style.opacity = 1 - (x / maxPos);
    };

    thumb.addEventListener('touchstart', onStart);
    thumb.addEventListener('mousedown', onStart);
    window.addEventListener('touchend', onEnd);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('mousemove', onMove);

    function confirmProgram() {
        haptic([60, 40, 60]);
        container.classList.add('success-state');
        thumb.style.left = (container.offsetWidth - 58) + 'px';
        thumb.style.background = 'var(--m-blue-light)';
        thumb.style.boxShadow = '0 0 20px var(--m-blue-light)';
        thumb.innerHTML = '<svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        
        sliderText.innerText = "GRABADO";
        sliderText.style.opacity = "1";
        sliderText.style.color = "var(--m-blue-light)";
        sliderText.style.textShadow = "0 0 10px rgba(0, 242, 255, 0.5)";

        setTimeout(() => {
            isLocked = false;
            document.getElementById('controlsContainer').style.opacity = '1';
            document.getElementById('prepareBtn').style.display = 'block';
            container.style.display = 'none';
            thumb.style.left = '5px';
            thumb.style.background = 'var(--m-red)';
            thumb.style.boxShadow = '0 0 15px var(--accent-red-glow)';
            progress.style.width = '0';
            thumb.innerHTML = `<svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>`;
            sliderText.innerText = "DESLIZA PARA GRABAR";
            sliderText.style.color = "var(--text-muted)";
            sliderText.style.textShadow = "none";
        }, 3000);
    }

    // He eliminado la simulación automática de sensores. 
    // Los valores reales se integrarían aquí mediante WebBluetooth u otra API de hardware.
</script>
</body>
</html>
