<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>N54 King Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050608;
            --panel-bg: rgba(10, 12, 16, 0.96);
            --panel-border: rgba(255, 255, 255, 0.08);
            --m-blue-light: #00a2e8;
            --m-blue-dark: #1c39bb;
            --m-red: #ed1c24;
            --text-main: #ffffff;
            --text-muted: #62656a;
            --display-bg: #000000;
            --warning-orange: #ffaa00;
            --carbon-pattern: radial-gradient(circle, #1a1a1a 1px, transparent 1px);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            width: 100vw;
            /* Fondo inspirado en fibra de carbono */
            background: 
                linear-gradient(135deg, #0f1115 0%, #050608 100%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Capa de textura de carbono */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(45deg, rgba(0,0,0,0.2) 25%, transparent 25%, transparent 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2) 75%, transparent 75%, transparent),
                linear-gradient(-45deg, rgba(0,0,0,0.2) 25%, transparent 25%, transparent 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2) 75%, transparent 75%, transparent);
            background-size: 4px 4px;
            z-index: -1;
            opacity: 0.3;
        }

        .main-container {
            width: 92%;
            max-width: 400px;
            height: auto; 
            padding: 24px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 32px;
            box-shadow: 
                0 40px 100px rgba(0,0,0,0.9),
                inset 0 0 40px rgba(0,0,0,0.5);
            backdrop-filter: blur(40px);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin: 1.5vh auto 30px auto; 
            overflow: hidden; /* Importante para que las franjas respeten la curva */
        }

        /* Franjas M-Power corregidas */
        .m-accent-border {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 6px;
            display: flex;
            z-index: 20;
            /* No necesita border-radius porque el contenedor tiene overflow:hidden */
        }
        .b-1 { background: var(--m-blue-light); flex: 1; box-shadow: 0 2px 10px rgba(0, 162, 232, 0.4); }
        .b-2 { background: var(--m-blue-dark); flex: 1; box-shadow: 0 2px 10px rgba(28, 57, 187, 0.4); }
        .b-3 { background: var(--m-red); flex: 1; box-shadow: 0 2px 10px rgba(237, 28, 36, 0.4); }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
        }

        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            font-style: italic;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 0%, #aaa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo span { 
            color: var(--m-red); 
            -webkit-text-fill-color: var(--m-red);
            text-shadow: 0 0 15px rgba(237, 28, 36, 0.4);
        }

        .signal-indicator {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
        }

        .display-group {
            display: flex;
            gap: 14px;
        }

        .display-box {
            flex: 1;
            background: #000;
            border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid var(--m-blue-light);
            border-radius: 14px;
            padding: 16px 12px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 20px rgba(0, 162, 232, 0.05);
        }
        .display-box.duty { border-left-color: var(--m-red); box-shadow: inset 0 0 20px rgba(237, 28, 36, 0.05); }
        
        .display-box:active { transform: scale(0.95); background: #050505; }

        .display-label {
            font-size: 0.55rem;
            color: var(--text-muted);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .display-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            justify-content: flex-start;
            line-height: 0.85;
            color: #fff;
        }
        .display-unit { font-size: 0.85rem; color: var(--text-muted); margin-left: 4px; font-weight: 600; }

        .peak-container {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.6rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
        }

        .controls-wrapper {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .control-group {
            background: linear-gradient(180deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            border-radius: 20px;
            padding: 16px;
            border: 1px solid var(--panel-border);
            position: relative;
        }

        .control-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 1.2px;
            margin-bottom: 10px;
            display: block;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-plus-minus {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #1e2128 0%, #0c0d10 100%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0,0,0,0.4);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-plus-minus:active { 
            transform: translateY(2px) scale(0.92);
            background: #15171c;
            box-shadow: 0 2px 5px rgba(0,0,0,0.6);
        }

        .control-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 0 25px rgba(255,255,255,0.15);
        }

        #prepareBtn {
            background: linear-gradient(135deg, #ed1c24 0%, #8b1014 100%);
            color: white;
            border: none;
            padding: 20px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 800;
            width: 100%;
            letter-spacing: 4px;
            text-transform: uppercase;
            box-shadow: 0 15px 35px rgba(237, 28, 36, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 5px;
        }
        #prepareBtn:active { transform: translateY(3px) scale(0.98); opacity: 0.95; }

        .slider-container {
            display: none;
            background: #000;
            border-radius: 50px;
            height: 68px;
            width: 100%;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; 
            box-shadow: inset 0 5px 20px rgba(0,0,0,1);
            margin-top: 5px;
        }

        .slider-container.success-state {
            border-color: var(--m-blue-light);
            box-shadow: 0 0 30px rgba(0, 162, 232, 0.4), inset 0 0 15px rgba(0, 162, 232, 0.2);
        }

        .slider-track-text {
            position: absolute;
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            color: #444; 
            font-size: 0.75rem; 
            font-weight: 900;
            letter-spacing: 2px;
            z-index: 1;
            text-transform: uppercase;
        }

        .slider-thumb {
            width: 58px; height: 58px;
            background: linear-gradient(135deg, var(--m-red), #9e1217);
            border-radius: 50%;
            position: absolute; left: 5px; top: 3px;
            display: flex; justify-content: center; align-items: center;
            z-index: 6;
            box-shadow: 0 5px 15px rgba(237, 28, 36, 0.5);
        }

        .slider-progress {
            position: absolute; top: 0; left: 0; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(237, 28, 36, 0.4));
            z-index: 2;
        }

        .warning-msg {
            font-size: 0.6rem;
            color: var(--warning-orange);
            font-weight: 900;
            text-align: center;
            margin-top: 6px;
            visibility: hidden;
            letter-spacing: 1.5px;
        }

        .critical { 
            border-color: rgba(255, 170, 0, 0.4); 
            background: linear-gradient(180deg, rgba(255, 170, 0, 0.05) 0%, transparent 100%); 
        }
        .critical .warning-msg { visibility: visible; animation: pulse-warn 1s infinite; }

        @keyframes pulse-warn {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.98); }
        }
    </style>
</head>
<body>

<div class="main-container" id="app">
    <!-- Franjas M corregidas al borde curvo del contenedor -->
    <div class="m-accent-border">
        <div class="b-1"></div><div class="b-2"></div><div class="b-3"></div>
    </div>

    <div class="header">
        <div class="logo">N54 <span>KING</span></div>
        <div class="signal-indicator">
            <div id="statusDot" style="width:8px; height:8px; border-radius:50%; background:#ed1c24; box-shadow:0 0 10px #ed1c24;"></div>
            <span id="statusText">SIN SEÑAL</span>
        </div>
    </div>

    <div class="display-group">
        <div class="display-box" onclick="resetPeak('boost')">
            <div class="display-label">BOOST</div>
            <div class="display-value"><span id="readPresion">0.0</span><span class="display-unit">PSI</span></div>
            <div class="peak-container">
                <span style="color:var(--m-blue-light)">MÁXIMO</span>
                <span id="peakBoost" style="color:#fff">0.0</span>
            </div>
        </div>
        <div class="display-box duty" onclick="resetPeak('duty')">
            <div class="display-label">DUTY CYCLE</div>
            <div class="display-value"><span id="readDuty">0</span><span class="display-unit">%</span></div>
            <div class="peak-container">
                <span style="color:var(--m-red)">MÁXIMO</span>
                <span id="peakDuty" style="color:#fff">0</span>
            </div>
        </div>
    </div>

    <div class="controls-wrapper" id="controlsContainer">
        <div class="control-group">
            <span class="control-label">Presión Inicial (PSI)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pi', -1)" ontouchstart="handlePress(event, 'pi', -1)">-</button>
                <span class="control-value" id="valPI">10</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pi', 1)" ontouchstart="handlePress(event, 'pi', 1)">+</button>
            </div>
            <div class="warning-msg">AJUSTANDO MAPA</div>
        </div>

        <div class="control-group">
            <span class="control-label">Presión Final (PSI)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pf', -1)" ontouchstart="handlePress(event, 'pf', -1)">-</button>
                <span class="control-value" id="valPF">20</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'pf', 1)" ontouchstart="handlePress(event, 'pf', 1)">+</button>
            </div>
            <div class="warning-msg">AJUSTANDO MAPA</div>
        </div>

        <div class="control-group" id="dutyGroupI">
            <span class="control-label">Duty Inicial (%)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'di', -1)" ontouchstart="handlePress(event, 'di', -1)">-</button>
                <span class="control-value" id="valDI">30</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'di', 1)" ontouchstart="handlePress(event, 'di', 1)">+</button>
            </div>
            <div class="warning-msg">AVISO: DUTY ELEVADO</div>
        </div>

        <div class="control-group" id="dutyGroupF">
            <span class="control-label">Duty Final (%)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'df', -1)" ontouchstart="handlePress(event, 'df', -1)">-</button>
                <span class="control-value" id="valDF">60</span>
                <button class="btn-plus-minus" onmousedown="handlePress(event, 'df', 1)" ontouchstart="handlePress(event, 'df', 1)">+</button>
            </div>
            <div class="warning-msg">AVISO: DUTY ELEVADO</div>
        </div>
    </div>

    <div class="action-area" style="min-height: 80px; display:flex; align-items:center;">
        <button id="prepareBtn" onclick="showSlider()">PROGRAMAR ECU</button>
        <div class="slider-container" id="sliderContainer">
            <div class="slider-progress" id="sliderProgress"></div>
            <div class="slider-track-text" id="sliderText">CONFIRMAR ESCRITURA</div>
            <div class="slider-thumb" id="sliderThumb">
                <svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </div>
        </div>
    </div>
</div>

<script>
    let values = { pi: 10, pf: 20, di: 30, df: 60 };
    let peaks = { boost: 0.0, duty: 0 };
    let isLocked = false;
    let adjustInterval;

    function haptic(ms = 20) { if (navigator.vibrate) navigator.vibrate(ms); }

    function resetPeak(type) {
        haptic(40);
        peaks[type] = 0;
        document.getElementById(type === 'boost' ? 'peakBoost' : 'peakDuty').innerText = type === 'boost' ? '0.0' : '0';
    }

    function handlePress(e, id, delta) {
        if (isLocked) return;
        e.preventDefault();
        haptic(15);
        updateValue(id, delta);
        adjustInterval = setInterval(() => { haptic(10); updateValue(id, delta); }, 100);
    }

    function stopAdjust() { clearInterval(adjustInterval); }
    window.addEventListener('touchend', stopAdjust);
    window.addEventListener('mouseup', stopAdjust);

    function updateValue(id, delta) {
        let nv = values[id] + delta;
        if (id === 'pi' && nv > values.pf) nv = values.pf;
        if (id === 'pf' && nv < values.pi) nv = values.pi;
        if (id === 'di' && nv > values.df) nv = values.df;
        if (id === 'df' && nv < values.di) nv = values.di;
        nv = Math.max(0, Math.min(100, nv));
        values[id] = nv;
        document.getElementById(`val${id.toUpperCase()}`).innerText = nv;
        document.getElementById('dutyGroupI').classList.toggle('critical', values.di > 80);
        document.getElementById('dutyGroupF').classList.toggle('critical', values.df > 80);
    }

    function setConnectionState(isConnected) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        if (isConnected) {
            dot.style.background = '#00f260';
            dot.style.boxShadow = '0 0 15px #00f260';
            text.innerText = 'CONECTADO';
            text.style.color = 'var(--text-main)';
        } else {
            dot.style.background = '#ed1c24';
            dot.style.boxShadow = '0 0 10px #ed1c24';
            text.innerText = 'SIN SEÑAL';
            text.style.color = 'var(--text-muted)';
        }
    }

    function showSlider() {
        haptic(50);
        isLocked = true;
        document.getElementById('controlsContainer').style.opacity = '0.3';
        document.getElementById('prepareBtn').style.display = 'none';
        const container = document.getElementById('sliderContainer');
        container.style.display = 'block';
    }

    const thumb = document.getElementById('sliderThumb');
    const container = document.getElementById('sliderContainer');
    const progress = document.getElementById('sliderProgress');
    const sliderText = document.getElementById('sliderText');
    let isDragging = false;

    const onStart = (e) => { if (!isLocked) return; isDragging = true; thumb.style.transition = 'none'; haptic(10); };
    
    const onEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        let pos = parseInt(thumb.style.left) || 5;
        let maxPos = container.offsetWidth - 65;
        if (pos > maxPos - 10) {
            confirmProgram();
        } else {
            thumb.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
            thumb.style.left = '5px';
            progress.style.width = '0';
            sliderText.style.opacity = '1';
        }
    };

    const onMove = (e) => {
        if (!isDragging) return;
        let clientX = e.touches ? e.touches[0].clientX : e.clientX;
        let rect = container.getBoundingClientRect();
        let maxPos = container.offsetWidth - 65;
        let x = Math.max(5, Math.min(clientX - rect.left - 30, maxPos));
        thumb.style.left = x + 'px';
        progress.style.width = x + 30 + 'px';
        sliderText.style.opacity = 1 - (x / maxPos);
    };

    thumb.addEventListener('touchstart', onStart);
    thumb.addEventListener('mousedown', onStart);
    window.addEventListener('touchend', onEnd);
    window.addEventListener('mouseup', onEnd);
    window.addEventListener('touchmove', onMove);
    window.addEventListener('mousemove', onMove);

    function confirmProgram() {
        haptic([80, 50, 100]);
        container.classList.add('success-state');
        thumb.style.left = (container.offsetWidth - 65) + 'px';
        thumb.style.background = 'var(--m-blue-light)';
        thumb.style.boxShadow = '0 0 25px var(--m-blue-light)';
        thumb.innerHTML = '<svg viewBox="0 0 24 24" width="30" height="30" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>';
        sliderText.innerText = "TRANSFERENCIA EXITOSA";
        sliderText.style.opacity = "1";
        sliderText.style.color = "var(--m-blue-light)";

        setTimeout(() => {
            isLocked = false;
            document.getElementById('controlsContainer').style.opacity = '1';
            document.getElementById('prepareBtn').style.display = 'block';
            container.style.display = 'none';
            container.classList.remove('success-state');
            thumb.style.left = '5px';
            thumb.style.background = 'linear-gradient(135deg, var(--m-red), #9e1217)';
            thumb.style.boxShadow = '0 5px 15px rgba(237, 28, 36, 0.5)';
            progress.style.width = '0';
            thumb.innerHTML = `<svg viewBox="0 0 24 24" width="28" height="28" fill="white"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>`;
            sliderText.innerText = "CONFIRMAR ESCRITURA";
            sliderText.style.color = "#444";
        }, 2500);
    }
</script>
</body>
</html>
