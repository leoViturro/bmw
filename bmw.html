<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N54 King Performance</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050608;
            --panel-bg: rgba(16, 18, 22, 0.95);
            --panel-border: rgba(255, 255, 255, 0.08);
            --m-blue-light: #00f2ff;
            --m-blue-dark: #1c39bb;
            --m-red: #ed1c24;
            --accent-red-glow: rgba(237, 28, 36, 0.6);
            --text-main: #ffffff;
            --text-muted: #8a8d93;
            --display-bg: #000000;
            --warning-orange: #ffaa00;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            touch-action: manipulation;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            background-image: 
                linear-gradient(45deg, rgba(255,255,255,0.01) 25%, transparent 25%, transparent 50%, rgba(255,255,255,0.01) 50%, rgba(255,255,255,0.01) 75%, transparent 75%, transparent),
                radial-gradient(circle at 50% 0%, #1a202c 0%, transparent 80%);
            background-size: 4px 4px, 100% 100%;
            overflow: hidden;
        }

        .main-container {
            width: 94%;
            max-width: 400px;
            height: 98vh;
            max-height: 850px;
            padding: 12px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9);
            backdrop-filter: blur(25px);
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
            overflow: hidden; 
        }

        .m-accent-border {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            display: flex;
            z-index: 10;
        }
        .b-1 { background: #00a2e8; flex: 1; }
        .b-2 { background: var(--m-blue-dark); flex: 1; }
        .b-3 { background: var(--m-red); flex: 1; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 5px;
        }

        .logo {
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            font-style: italic;
            letter-spacing: -1px;
        }
        .logo span { color: var(--m-red); }

        .display-group {
            display: flex;
            gap: 10px;
            margin-top: 8%; 
        }

        .display-box {
            flex: 1;
            background: var(--display-bg);
            border-bottom: 3px solid #00a2e8;
            border-radius: 15px;
            padding: 10px;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.6);
            transition: all 0.2s ease;
            position: relative;
            cursor: pointer;
        }
        .display-box:active { transform: scale(0.98); }
        .display-box.duty { border-bottom-color: var(--m-red); }

        .display-label {
            font-size: 0.55rem;
            color: var(--text-muted);
            font-weight: 700;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 2px;
        }

        .display-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            display: flex;
            align-items: baseline;
            justify-content: center;
            line-height: 1;
        }
        .display-unit { font-size: 0.9rem; color: var(--text-muted); margin-left: 4px; }

        .controls-wrapper {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: center;
        }

        .control-group {
            background: rgba(255,255,255,0.02);
            border-radius: 16px;
            padding: 8px 14px 4px 14px;
            border: 1px solid var(--panel-border);
            position: relative;
            min-height: 88px;
        }

        .control-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 3px;
            display: block;
        }

        .control-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-plus-minus {
            width: 42px;
            height: 42px;
            background: linear-gradient(145deg, #1a1d24, #0d0f12);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1.4rem;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .control-value {
            font-family: 'Rajdhani', sans-serif;
            font-size: 2.2rem;
            font-weight: 700;
            min-width: 80px;
            text-align: center;
        }

        .action-area {
            margin-top: 2px;
            min-height: 65px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #connectBtn {
            background: #1a1d24;
            color: var(--m-blue-light);
            border: 1px solid var(--m-blue-light);
            padding: 10px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            flex: 1;
        }

        #prepareBtn {
            background: linear-gradient(135deg, #cc0000 0%, #800000 100%);
            color: white;
            border: 1px solid #000;
            padding: 14px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 700;
            flex: 2;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
        }

        .slider-container {
            display: none;
            background: #000;
            border-radius: 40px;
            height: 62px;
            width: 100%;
            position: relative;
            border: 2px solid rgba(255, 255, 255, 0.05);
            overflow: hidden; 
        }

        .slider-thumb {
            width: 52px; height: 52px;
            background: var(--m-red);
            border-radius: 50%;
            position: absolute; left: 5px; top: 3px;
            display: flex; justify-content: center; align-items: center;
            z-index: 6;
            box-shadow: 0 0 15px var(--accent-red-glow);
        }

        .slider-progress {
            position: absolute; top: 0; left: 0; height: 100%;
            background: rgba(237, 28, 36, 0.2);
            z-index: 2;
        }

        .warning-msg {
            font-size: 0.6rem;
            color: var(--warning-orange);
            font-weight: 800;
            text-align: center;
            margin-top: 1px;
            visibility: hidden;
            text-transform: uppercase;
        }

        .critical { border-color: var(--warning-orange); background: rgba(255, 170, 0, 0.05); }
        .critical .warning-msg { visibility: visible; }
    </style>
</head>
<body>

<div class="main-container" id="app">
    <div class="m-accent-border">
        <div class="b-1"></div><div class="b-2"></div><div class="b-3"></div>
    </div>

    <div class="header">
        <div class="logo">N54 <span>KING</span></div>
        <div id="btStatus" onclick="requestBluetooth()" style="background:rgba(255,255,255,0.05); padding:4px 10px; border-radius:12px; font-size:0.65rem; font-weight:700; display:flex; align-items:center; gap:6px; cursor:pointer;">
            <div id="statusDot" style="width:8px; height:8px; border-radius:50%; background:#888;"></div>
            <span id="statusText">CONECTAR BT</span>
        </div>
    </div>

    <div class="display-group">
        <div class="display-box" onclick="resetPeak('boost')">
            <div class="display-label">PW REAL (ms)</div>
            <div class="display-value"><span id="readPresion">0.00</span><span class="display-unit">ms</span></div>
            <div style="font-size:0.6rem; text-align:center; color:var(--text-muted);"><span style="color:var(--m-blue-light)">MÁX</span> <span id="peakBoost">0.00</span></div>
        </div>
        <div class="display-box duty" onclick="resetPeak('duty')">
            <div class="display-label">LECTURA AD</div>
            <div class="display-value"><span id="readDuty">0</span><span class="display-unit">pts</span></div>
            <div style="font-size:0.6rem; text-align:center; color:var(--text-muted);"><span style="color:var(--m-red)">MÁX</span> <span id="peakDuty">0</span></div>
        </div>
    </div>

    <div class="controls-wrapper" id="controlsContainer">
        <!-- Controles de configuración que se envían al hardware -->
        <div class="control-group">
            <span class="control-label">Umbral Inyección (ms)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onclick="updateValue('pi', -0.5)">-</button>
                <span class="control-value" id="valPI">0.5</span>
                <button class="btn-plus-minus" onclick="updateValue('pi', 0.5)">+</button>
            </div>
        </div>
        
        <div class="control-group">
            <span class="control-label">Límite Máximo (ms)</span>
            <div class="control-row">
                <button class="btn-plus-minus" onclick="updateValue('pf', -0.5)">-</button>
                <span class="control-value" id="valPF">20.0</span>
                <button class="btn-plus-minus" onclick="updateValue('pf', 0.5)">+</button>
            </div>
        </div>
    </div>

    <div class="action-area">
        <button id="prepareBtn" onclick="showSlider()">ENVIAR CONFIG</button>
        <div class="slider-container" id="sliderContainer">
            <div class="slider-progress" id="sliderProgress"></div>
            <div class="slider-track-text" id="sliderText">DESLIZA PARA GRABAR</div>
            <div class="slider-thumb" id="sliderThumb">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </div>
        </div>
    </div>
</div>

<script>
    // UUIDs para el Arduino Uno R4 BLE
    const SERVICE_UUID = "19b10000-e8f2-537e-4f6c-d104768a1214";
    const CHAR_DATA_UUID = "19b10001-e8f2-537e-4f6c-d104768a1214"; // Arduino -> App (Notificaciones)
    const CHAR_CONFIG_UUID = "19b10002-e8f2-537e-4f6c-d104768a1214"; // App -> Arduino (Escritura)

    let bleDevice, bleCharData, bleCharConfig;
    let values = { pi: 0.5, pf: 20.0 };
    let peaks = { boost: 0.0, duty: 0 };

    async function requestBluetooth() {
        try {
            document.getElementById('statusText').innerText = "BUSCANDO...";
            bleDevice = await navigator.bluetooth.requestDevice({
                filters: [{ namePrefix: 'N54_KING' }],
                optionalServices: [SERVICE_UUID]
            });

            const server = await bleDevice.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            bleCharData = await service.getCharacteristic(CHAR_DATA_UUID);
            bleCharConfig = await service.getCharacteristic(CHAR_CONFIG_UUID);

            // Suscribirse a los datos del Arduino
            await bleCharData.startNotifications();
            bleCharData.addEventListener('characteristicvaluechanged', handleHardwareData);

            updateUIStatus(true);
        } catch (error) {
            console.log(error);
            updateUIStatus(false);
        }
    }

    function handleHardwareData(event) {
        const data = event.target.value;
        // Supongamos que el Arduino envía 4 bytes: 2 para lectura AD, 2 para PW (ms * 100)
        const rawAD = data.getUint16(0, true);
        const rawPW = data.getUint16(2, true) / 100.0;

        document.getElementById('readDuty').innerText = rawAD;
        document.getElementById('readPresion').innerText = rawPW.toFixed(2);

        if (rawAD > peaks.duty) {
            peaks.duty = rawAD;
            document.getElementById('peakDuty').innerText = rawAD;
        }
        if (rawPW > peaks.boost) {
            peaks.boost = rawPW;
            document.getElementById('peakBoost').innerText = rawPW.toFixed(2);
        }
    }

    async function sendConfigToHardware() {
        if (!bleCharConfig) return;
        // Enviar configuración como bytes
        const data = new Uint16Array([values.pi * 100, values.pf * 100]);
        await bleCharConfig.writeValue(data);
    }

    function updateUIStatus(connected) {
        const dot = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        dot.style.background = connected ? "#00f260" : "#ff1c1c";
        dot.style.boxShadow = connected ? "0 0 10px #00f260" : "0 0 10px #ff1c1c";
        text.innerText = connected ? "N54 CONECTADO" : "CONECTAR BT";
    }

    function updateValue(id, delta) {
        values[id] = Math.max(0, Math.min(30, values[id] + delta));
        document.getElementById(`val${id.toUpperCase()}`).innerText = values[id].toFixed(1);
        if (navigator.vibrate) navigator.vibrate(10);
    }

    function resetPeak(type) {
        peaks[type] = 0;
        document.getElementById(type === 'boost' ? 'peakBoost' : 'peakDuty').innerText = type === 'boost' ? '0.00' : '0';
    }

    // Lógica del Slider (igual que antes, pero llama a sendConfigToHardware)
    function showSlider() {
        document.getElementById('prepareBtn').style.display = 'none';
        document.getElementById('sliderContainer').style.display = 'block';
    }

    // (Aquí iría el resto del JS de manejo del slider para ejecutar sendConfigToHardware al final)
</script>
</body>
</html>
